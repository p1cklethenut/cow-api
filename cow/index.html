<!doctype html>
<html lang="en" >
  <head>
    <meta charset="utf-8" />
    <link rel="icon" type="image/x-icon" href="/cowcur.png">
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />
    <meta name="description" content="" />
    <meta name="author" content="" />
    <title>CowTube</title>

    <!-- Bootstrap icons-->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <!-- Core theme CSS (includes Bootstrap)-->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    <style>
      body {         user-select: none;
    }
      .cowparticle {
        position: absolute;
      }
      .cowbtn {
        user-select: none;
        position: relative;
        width: 100%;
        height: 100%;
        max-width: 200px;

        transition: width 0.4s ease; /* Duration: 3 seconds with an ease timing function */
      }


      .cowbtn img {
        width: 100%;
        max-width: 200px;
      }
      .gradient-border-mask {
        position: relative;
        backdrop-filter: blur(10px);
      }

      .gradient-border-mask::before {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: 30px;
        border: 3px solid transparent;
        background: -webkit-linear-gradient(
                  right top,
                  #b7b3f5,
                  #b47aff) border-box;
        mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
        mask-composite: exclude;
      }
    </style>
  </head>
  <body class="d-flex flex-column">
    <main class="flex-shrink-0">
      <!-- Navigation-->
      <nav class="navbar navbar-expand-lg navbar-light bg-white border py-3">
        <div class="container px-2">
          <a class="navbar-brand" href="#"
            ><span
              class="fw-bolder"
              style="
              color:#b41aff;
                font-size: 30px;
              "
              >CowTube</span
            ></a
          >
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarSupportedContent"
            aria-controls="navbarSupportedContent"
            aria-expanded="false"
            aria-label="Toggle navigation"
          >
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav ms-auto mb-2 mb-lg-0 small fw-bolder">
              <li class="nav-item"><a class="nav-link">Home</a></li>
              <li class="nav-item">
                <a class="nav-link" href="/rollcow">rollcow</a>
              </li>
            </ul>
          </div>
        </div>
      </nav>
      <!-- Header-->
      <header class="pt-3 pb-5">
        <div
          class="gradient-border-mask container p-5"
        >
            
           <h1 id="num" class="fw-bold" style="
                font-size: 50px;
                background: -webkit-linear-gradient(
                  right top,
                  #b7b3f5,
                  #b41aff
                );
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
              ">Total Cows: 0</h1>
          <h2 id="selfnum" class="" style="
                font-size: 30px;
                background: -webkit-linear-gradient(
                  right top,
                  #b7b3f5,
                  #b47aff
                                    
                );
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
              ">Your contribution: 0</h2>

          <div style="height:250px" class="row gx-5 align-items-center">              <!-- Header text content-->

            <div class="text-center text-xxl-start">
              <div class="fs-3 fw-light text-muted">
                <button
                  id="cowbtn"
                  class="cowbtn border border-0 bg-transparent"
                  onclick="clicked()"
                >
                  <img class="cowimg"
                    src="/cow.png"
                  />
                </button>
              </div>
            </div>
          </div>
        </div>
      </header>
      <hr class="m">
      <footer class="footer fw-light mx-3 my-2">cowtube v0.920</footer>
    </main>
  <script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>
  <script src="script.js"></script>
  </body>
</html>
